name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ============= 后端测试 =============
  backend-test:
    name: 后端代码检查
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: 安装后端依赖
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 代码格式检查（flake8）
        working-directory: ./backend
        run: |
          pip install flake8
          flake8 app/ --max-line-length=120 --extend-ignore=E203,W503 || true

      - name: 类型检查（mypy）
        working-directory: ./backend
        run: |
          pip install mypy
          mypy app/ --ignore-missing-imports || true

  # ============= 前端检查 =============
  frontend-check:
    name: 前端代码检查
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package.json'

      - name: 检查 package.json 格式
        working-directory: ./frontend
        run: node -e "JSON.parse(require('fs').readFileSync('package.json', 'utf8')); console.log('package.json 格式正确')"

  # ============= Docker 构建检查 =============
  docker-build:
    name: Docker 构建检查
    runs-on: ubuntu-latest
    needs: [backend-test]

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 检查 docker-compose 配置
        run: |
          docker compose config || docker-compose config

      - name: 构建后端 Docker 镜像
        run: docker build -t brain-training-backend ./backend
